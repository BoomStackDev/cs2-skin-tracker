<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 Skin Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>CS2 Skin Tracker</h1>
      <p class="subtitle">Compare prices across marketplaces</p>
    </header>

    <section class="search-section">
      <form class="search-box" id="search-form">
        <input type="text" id="search-input" placeholder="Search for a skin (e.g. AK-47 | Redline)" autocomplete="off">
        <button type="submit" id="search-btn">Search</button>
      </form>
      <div class="filters-panel">
        <button class="filters-toggle" id="filters-toggle">
          <span>Filters</span>
          <span class="toggle-icon">&#9660;</span>
        </button>
        <div class="filters-body" id="filters-body" hidden>
          <div class="filter-row">
            <div class="filter-group">
              <label for="filter-price-min">Price Min ($)</label>
              <input type="number" id="filter-price-min" min="0" step="0.01" placeholder="0">
            </div>
            <div class="filter-group">
              <label for="filter-price-max">Price Max ($)</label>
              <input type="number" id="filter-price-max" min="0" step="0.01" placeholder="Any">
            </div>
          </div>
          <div class="filter-row">
            <div class="filter-group">
              <label for="filter-float-min">Float Min</label>
              <input type="number" id="filter-float-min" min="0" max="1" step="0.01" placeholder="0.00">
            </div>
            <div class="filter-group">
              <label for="filter-float-max">Float Max</label>
              <input type="number" id="filter-float-max" min="0" max="1" step="0.01" placeholder="1.00">
            </div>
            <div class="filter-group">
              <label for="filter-paint-seed">Paint Seed</label>
              <input type="number" id="filter-paint-seed" min="0" max="999" step="1" placeholder="Any">
            </div>
          </div>
          <div class="filter-row">
            <div class="filter-group">
              <label for="filter-wear">Wear</label>
              <select id="filter-wear">
                <option value="">Any</option>
                <option value="Factory New">Factory New</option>
                <option value="Minimal Wear">Minimal Wear</option>
                <option value="Field-Tested">Field-Tested</option>
                <option value="Well-Worn">Well-Worn</option>
                <option value="Battle-Scarred">Battle-Scarred</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-stattrak">StatTrak</label>
              <select id="filter-stattrak">
                <option value="either">Either</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-souvenir">Souvenir</label>
              <select id="filter-souvenir">
                <option value="either">Either</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div id="search-results" class="search-results"></div>
    </section>

    <section class="watchlist-section">
      <div class="watchlist-header">
        <h2>Watchlist</h2>
        <div class="watchlist-controls">
          <select id="sort-select" class="sort-select">
            <option value="dateDesc">Date Added (Newest)</option>
            <option value="nameAsc">Name (A&ndash;Z)</option>
            <option value="bestAsc">Best Price (Lowest)</option>
            <option value="skinportAsc">Skinport Price (Lowest)</option>
            <option value="steamAsc">Steam Price (Lowest)</option>
            <option value="bitskinsAsc">BitSkins Price (Lowest)</option>
            <option value="dmarketAsc">DMarket Price (Lowest)</option>
          </select>
          <button id="refresh-btn">Refresh Prices</button>
        </div>
      </div>
      <div id="watchlist-empty" class="empty-state">
        <p>Your watchlist is empty. Search for skins above to add them.</p>
      </div>
      <table id="watchlist-table" class="watchlist-table" hidden>
        <thead>
          <tr>
            <th>Skin</th>
            <th class="mobile-hide">Skinport</th>
            <th class="mobile-hide">Steam</th>
            <th id="csfloat-header" class="mobile-hide">CSFloat</th>
            <th class="mobile-hide">BitSkins</th>
            <th class="mobile-hide">DMarket</th>
            <th id="skinmonkey-header" class="mobile-hide">Skin Monkey <span class="badge-inactive">Inactive</span><div class="activate-hint">No public API available</div></th>
            <th>Best</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="watchlist-body"></tbody>
      </table>
    </section>
  </div>

  <div class="modal-overlay" id="skin-modal">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
